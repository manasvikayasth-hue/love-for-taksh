<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Taksh ❤️</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #ffd6e0, #ffc2d1, #ffb3c6);
        color: #5a2a3a;
        overflow: hidden;
      }

      /* 🌸 BACKGROUND HEARTS */
      #bgHearts span {
        position: absolute;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        animation: float 8s linear infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh);
          opacity: 0;
        }
      }

      /* SCENES */
      .scene {
        position: fixed;
        width: 100%;
        height: 100%;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
      }

      .active {
        display: flex;
        animation: fade 1s;
      }

      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* BUTTONS */
      button {
        padding: 12px 25px;
        margin: 10px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        font-weight: 500;
      }

      /* 💖 GLOWING YES BUTTON */
      .yes {
        background: white;
        color: #ff4e73;
        animation: glowPulse 2s infinite ease-in-out;
      }

      @keyframes glowPulse {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0px rgba(255, 78, 115, 0.3);
        }
        50% {
          transform: scale(1.08);
          box-shadow: 0 0 25px rgba(255, 78, 115, 0.6);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0px rgba(255, 78, 115, 0.3);
        }
      }

      .no {
        background: transparent;
        border: 2px solid #ff4e73;
        color: #ff4e73;
      }

      /* SHAKE */
      .shake {
        animation: shake 0.3s;
      }

      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-5px);
        }
        100% {
          transform: translateX(0);
        }
      }

      /* 💋 KISS */
      .kiss {
        position: fixed;
        font-size: 28px;
        animation: pop 1s ease forwards;
      }

      @keyframes pop {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        50% {
          transform: scale(1.4);
          opacity: 1;
        }
        100% {
          transform: translateY(-60px);
          opacity: 0;
        }
      }

      /* SCORE */
      #scoreBoard {
        position: fixed;
        top: 20px;
        left: 20px;
        background: white;
        color: #ff4e73;
        padding: 10px 15px;
        border-radius: 15px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div id="scoreBoard">Score: 0 💖 | Kisses: 0 💋</div>
    <div id="bgHearts"></div>

    <!-- INTRO -->
    <div class="scene active" id="intro">
      <h1>Every love story is beautiful…</h1>
      <h1>But ours is my favorite ❤️</h1>
    </div>

    <!-- LOCK -->
    <div class="scene" id="lock">
      <h2>Enter our secret ❤️</h2>
      <input type="password" id="pass" />
      <br /><br />
      <button onclick="unlock()">Unlock</button>
    </div>

    <!-- MAIN -->
    <div class="scene" id="main">
      <h1 id="text"></h1>
      <button class="yes" onclick="yesClick()">Yes ❤️</button>
      <button class="no" id="noBtn">No 😢</button>
    </div>

    <!-- QUIZ -->
    <div class="scene" id="quiz">
      <h2>Let’s test you 😏</h2>
      <div id="quizContent"></div>
    </div>

    <!-- FINAL -->
    <div class="scene" id="proposal">
      <h1>Will you stay with me forever, Taksh? 💍❤️</h1>
      <button onclick="finalYes()">YES 💖</button>
    </div>

    <audio id="music" loop>
      <source src="Tum Ho Toh Saiyaara 128 Kbps.mp3" />
    </audio>

    <script>
      /* BACKGROUND HEARTS */
      setInterval(() => {
        const heart = document.createElement("span");
        heart.innerHTML = "💗";
        heart.style.left = Math.random() * 100 + "%";
        heart.style.fontSize = Math.random() * 10 + 10 + "px";
        document.getElementById("bgHearts").appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }, 500);

      /* SCENES */
      function showScene(id) {
        document
          .querySelectorAll(".scene")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      setTimeout(() => showScene("lock"), 4000);

      /* PASSWORD */
      function unlock() {
        if (pass.value === "Taksh@1115") {
          showScene("main");
          typeWriter();
          music.play();
        } else alert("Wrong 😢");
      }

      /* TEXT */
      const msg = `Taksh… ❤️

You make everything better.
Will you stay forever? 💖`;

      let i = 0;
      function typeWriter() {
        if (i < msg.length) {
          text.innerHTML += msg[i++];
          setTimeout(typeWriter, 30);
        }
      }

      /* YES */
      function yesClick() {
        text.innerHTML = "I already knew huh! 😏❤️";
        setTimeout(() => showScene("quiz"), 1500);
      }

      /* NO BUTTON */
      const noBtn = document.getElementById("noBtn");

      const texts = [
        "Pookie pls 🥺",
        "Don’t you love me? 😭",
        "Think again 😤",
        "You sure?? 😢",
        "I’ll cry 😭",
        "Say yes naaa 💖",
        "Pretty please 😭💖",
        "You love me 😏❤️",
      ];

      let c = 0;

      noBtn.onclick = () => {
        c++;
        noBtn.innerText = texts[c % texts.length];
        noBtn.classList.add("shake");
        setTimeout(() => noBtn.classList.remove("shake"), 300);
      };

      /* QUIZ */
      let score = 0,
        q = 0;

      const qs = [
        "Who do you love most?",
        "Who is your forever?",
        "Who is your pookie?",
      ];

      function showQ() {
        if (q >= qs.length) {
          showScene("proposal");
          return;
        }
        quizContent.innerHTML = `
  <p>${qs[q]}</p>
  <button onclick="correct()">You ❤️</button>
  <button onclick="wrong()">Someone else 😑</button>
  `;
      }
      showQ();

      function correct() {
        score++;
        q++;
        update();
        showQ();
      }
      function wrong() {
        for (let i = 0; i < 5; i++) spawnKiss();
        q++;
        update();
        showQ();
      }

      /* KISS */
      function spawnKiss() {
        const k = document.createElement("div");
        k.className = "kiss";
        k.innerHTML = "💋";
        k.style.left = Math.random() * 100 + "%";
        k.style.top = Math.random() * 100 + "%";
        document.body.appendChild(k);
        setTimeout(() => k.remove(), 1000);
      }

      /* SCORE */
      function update() {
        const kisses = (q - score) * 5;
        scoreBoard.innerText = `Score: ${score} 💖 | Kisses: ${kisses} 💋`;
      }

      /* FINAL */
      function finalYes() {
        document.body.innerHTML = `<h1 style="text-align:center;margin-top:40vh;">
  Forever with you ❤️💍</h1>`;
      }

      /* MUSIC */
      document.body.addEventListener("click", () => music.play(), {
        once: true,
      });
    </script>
  </body>
</html>
